<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shraman Sangh Chaturmas Suchi</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    header{
      background:#8B0000;
      color:white;
      padding:20px;
      text-align:center;
    }

    .container{
      width:90%;
      max-width:800px;
      margin:40px auto;
      text-align:center;
    }

    h2{
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:15px;
      font-size:18px;
      border:2px solid #ccc;
      border-radius:10px;
    }

    #results{
      margin-top:25px;
      text-align:left;
    }

    .card{
      background:white;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <h1>Shraman Sangh Chaturmas Suchi 2026</h1>
</header>

<div class="container">

  <h2>Search Maharaj Ji</h2>

  <input
    type="text"
    placeholder="Type Maharaj Ji Name..."
  >

  <div id="results">

    <div class="card">
      <h3>Website Under Development 🚧</h3>
      <p>Very soon you'll be able to search Maharaj Ji and view their Chaturmas location.</p>
    </div>

  </div>

</div>
<script src="script.js"></script>
</body>

</html>
